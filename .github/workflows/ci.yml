name: CI Workflow

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKER_HUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN || secrets.DOCKERHUB_TOKEN }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.22.2 cloudpickle==3.1.1 numpy==2.3.3 pandas==2.3.2 psutil==7.0.0 pyarrow==19.0.1 scikit-learn==1.7.2 scipy==1.16.2 docker==6.1.3 requests==2.31.0 urllib3==1.26.18

    - name: Run mlflow project
      run: |
        mlflow run MLProject --env-manager=local -P data=namadataset_preprocessing/daily_sales_forecasting.csv -P output=artifacts

    - name: Get latest MLflow run_id
      run: |
        RUN_ID=$(ls -td mlruns/0/*/ | grep -Eo '[0-9a-f]{32}' | head -n 1)
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Latest run_id: $RUN_ID"

    - name: Commit & Push results
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add mlruns/
        git commit -m "Upload artifact [skip ci]" || echo "No changes to commit"
        git push origin main

    - name: Build Docker Model
      run: |
        mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "mlproject-model" --env-manager local

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKERHUB_USER }}
        password: ${{ env.DOCKERHUB_TOKEN }}

    - name: Tag Docker Image
      run: |
        docker tag mlproject-model ${{ env.DOCKERHUB_USER }}/mlproject-model:latest
        
    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKERHUB_USER }}/mlproject-model:latest

