name: CI Workflow

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKER_HUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN || secrets.DOCKERHUB_TOKEN }}
      DAGSHUB_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
      DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        lfs: true

    - name: Setup python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"

    - name: Check Env
      run: |
        python --version
        pip --version
        pwd
        ls -la

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.22.2 cloudpickle==3.1.1 numpy==2.3.3 pandas==2.3.2 psutil==7.0.0 pyarrow==19.0.1 scikit-learn==1.7.2 scipy==1.16.2 docker==6.1.3 requests==2.31.0 urllib3==1.26.18

    - name: Run mlflow project
      run: |
        mlflow run MLProject --env-manager=local -P data=auto -P output=artifacts -P group_col=global -P target_col=Daily_Revenue

    - name: Get latest MLflow run_id
      run: |
        if [ -d "mlruns/0" ]; then
          MLRUNS_DIR="mlruns/0"
        else
          MLRUNS_DIR="MLProject/mlruns/0"
        fi

        RUN_ID=$(for d in "$MLRUNS_DIR"/*; do
          [ -d "$d" ] || continue
          name=$(basename "$d")
          if [[ "$name" =~ ^[0-9a-f]{32}$ ]] && [ -d "$d/artifacts" ]; then
            echo "$d"
          fi
        done | xargs -r ls -td | head -n 1 | xargs -r basename)

        if [ -z "$RUN_ID" ]; then
          echo "No valid MLflow run directory found under $MLRUNS_DIR"
          exit 1
        fi

        ARTIFACT_SOURCE="$MLRUNS_DIR/$RUN_ID/artifacts"
        if [ ! -d "$ARTIFACT_SOURCE" ]; then
          echo "Artifact directory not found: $ARTIFACT_SOURCE"
          exit 1
        fi

        echo "MLRUNS_DIR=$MLRUNS_DIR" >> $GITHUB_ENV
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "ARTIFACT_SOURCE=$ARTIFACT_SOURCE" >> $GITHUB_ENV
        echo "Latest run_id: $RUN_ID"

    - name: Get latest MLflow model_id
      run: |
        if [ -d "$MLRUNS_DIR/models" ]; then
          MODELS_DIR="$MLRUNS_DIR/models"
        elif [ -d "mlruns/0/models" ]; then
          MODELS_DIR="mlruns/0/models"
        else
          MODELS_DIR="MLProject/mlruns/0/models"
        fi

        MODEL_ID=$(for d in "$MODELS_DIR"/*; do
          [ -d "$d" ] || continue
          name=$(basename "$d")
          if [[ "$name" =~ ^m-[0-9a-f]{32}$ ]] && [ -f "$d/meta.yaml" ]; then
            updated=$(grep -E '^last_updated_timestamp:' "$d/meta.yaml" | awk '{print $2}')
            printf '%s %s\n' "${updated:-0}" "$name"
          fi
        done | sort -nr | head -n 1 | awk '{print $2}')

        if [ -z "$MODEL_ID" ]; then
          echo "No valid MLflow model directory found under $MODELS_DIR"
          exit 1
        fi

        echo "MODELS_DIR=$MODELS_DIR" >> $GITHUB_ENV
        echo "MODEL_ID=$MODEL_ID" >> $GITHUB_ENV
        echo "Latest model_id: $MODEL_ID"

    - name: Upload to GitHub LFS
      run: |
        ARTIFACT_DIR="ci_artifacts/mlproject/$RUN_ID"
        mkdir -p "$ARTIFACT_DIR"
        cp -r "$ARTIFACT_SOURCE/." "$ARTIFACT_DIR/"

        git lfs install --local
        git lfs track "ci_artifacts/**/*.pkl" "ci_artifacts/**/*.joblib" "ci_artifacts/**/*.onnx" "ci_artifacts/**/*.h5" "ci_artifacts/**/*.keras" "ci_artifacts/**/*.pt" "ci_artifacts/**/*.pth" "ci_artifacts/**/*.csv" "ci_artifacts/**/*.parquet"
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add .gitattributes ci_artifacts/
        git commit -m "Upload artifact to GitHub LFS [skip ci]" || echo "No changes to commit"
        git push origin main

    - name: Upload same artifacts to DagsHub LFS
      if: ${{ env.DAGSHUB_USERNAME != '' && env.DAGSHUB_TOKEN != '' && env.DAGSHUB_REPO != '' }}
      run: |
        ARTIFACT_DIR="ci_artifacts/mlproject/$RUN_ID"
        DAGSHUB_URL="https://${DAGSHUB_USERNAME}:${DAGSHUB_TOKEN}@dagshub.com/${DAGSHUB_REPO}.git"
        WORKDIR=$(mktemp -d)

        git clone --depth 1 "$DAGSHUB_URL" "$WORKDIR"
        mkdir -p "$WORKDIR/$ARTIFACT_DIR"
        cp -r "$ARTIFACT_DIR/." "$WORKDIR/$ARTIFACT_DIR/"

        cd "$WORKDIR"
        git lfs install --local
        git lfs track "ci_artifacts/**/*.pkl" "ci_artifacts/**/*.joblib" "ci_artifacts/**/*.onnx" "ci_artifacts/**/*.h5" "ci_artifacts/**/*.keras" "ci_artifacts/**/*.pt" "ci_artifacts/**/*.pth" "ci_artifacts/**/*.csv" "ci_artifacts/**/*.parquet"
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .gitattributes ci_artifacts/
        git commit -m "Sync MLflow artifacts from GitHub Actions [skip ci]" || echo "No changes to commit"
        git push origin HEAD:main

    - name: Build Docker Model
      run: |
        mlflow models build-docker --model-uri "models:/$MODEL_ID" --name "mlproject-model" --env-manager local

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKERHUB_USER }}
        password: ${{ env.DOCKERHUB_TOKEN }}

    - name: Tag Docker Image
      run: |
        docker tag mlproject-model ${{ env.DOCKERHUB_USER }}/mlproject-model:latest
        
    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKERHUB_USER }}/mlproject-model:latest

