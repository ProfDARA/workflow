name: MLProject CI

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  run-mlproject:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: file:${{ github.workspace }}/mlruns-ci
      MLFLOW_EXPERIMENT_NAME: MLProject_CI
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_TLS_VERIFY: ""
      DOCKER_CERT_PATH: ""
      LOCAL_IMAGE_NAME: mlproject-model:${{ github.run_number }}
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/mlproject-model:${{ github.run_number }}
    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.10 (Miniconda)
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: "3.10"
          activate-environment: mlproject-env
          environment-file: MLProject/conda.yaml
          auto-activate-base: false

      - name: Check Env
        shell: bash -l {0}
        run: |
          conda run -n mlproject-env python --version
          conda run -n mlproject-env python -c "import sys; print(sys.executable)"

      - name: Install dependencies
        shell: bash -l {0}
        run: |
          conda run -n mlproject-env python -m pip install "setuptools==68.2.2" "packaging==23.2" "wheel==0.41.2"
          conda run -n mlproject-env python -c "import pkg_resources; print('pkg_resources ok')"

      - name: Run mlflow project
        shell: bash -l {0}
        working-directory: ./MLProject
        run: |
          echo "Running MLflow project"
          rm -rf "${{ github.workspace }}/mlruns-ci"
          mkdir -p "${{ github.workspace }}/mlruns-ci"
          conda run -n mlproject-env python - <<'PY'
          import mlflow
          from mlflow.tracking import MlflowClient

          mlflow.set_tracking_uri("file:${{ github.workspace }}/mlruns-ci")
          client = MlflowClient()

          if client.get_experiment_by_name("MLProject_CI") is None:
              client.create_experiment("MLProject_CI")

          print("MLflow experiment store initialized")
          PY
          conda run -n mlproject-env mlflow run . --env-manager local --experiment-name MLProject_CI -P data=namadataset_preprocessing/daily_sales_forecasting.csv -P output=artifacts

      - name: Get latest MLflow run id
        id: mlflow_run
        shell: bash -l {0}
        working-directory: ./MLProject
        run: |
          RUN_ID=$(conda run -n mlproject-env python -c '
          import mlflow
          from mlflow.tracking import MlflowClient

          exp = mlflow.get_experiment_by_name("MLProject_CI")
          if exp is None:
            raise SystemExit("Experiment \"MLProject_CI\" not found")

          runs = MlflowClient().search_runs(exp.experiment_id, order_by=["start_time DESC"], max_results=1)
          if not runs:
            raise SystemExit("No MLflow runs found")

          print(runs[0].info.run_id)
          ' | tail -n 1 | tr -d '\r')
          if [ -z "$RUN_ID" ]; then
            echo "Failed to resolve MLflow run id" >&2
            exit 1
          fi
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Install Python dependencies
        shell: bash -l {0}
        run: |
          conda run -n mlproject-env python -m pip install "docker==6.1.3" "requests==2.31.0" "urllib3==1.26.18"

      - name: Upload to Google Drive
        uses: actions/upload-artifact@v4
        with:
          name: mlproject-artifacts
          path: MLProject/artifacts

      - name: Build Docker Model
        shell: bash -l {0}
        working-directory: ./MLProject
        run: |
          RUN_ID="${{ steps.mlflow_run.outputs.run_id }}"
          if [ -z "$RUN_ID" ]; then
            echo "Missing MLflow run id" >&2
            exit 1
          fi
          if conda run -n mlproject-env mlflow models build-docker --help | grep -q -- '--install-java'; then
            conda run -n mlproject-env mlflow models build-docker -m "runs:/${RUN_ID}/model" -n "$LOCAL_IMAGE_NAME" --install-java false
          else
            MLFLOW_DOCKER_OPENJDK_VERSION=11 \
              conda run -n mlproject-env mlflow models build-docker -m "runs:/${RUN_ID}/model" -n "$LOCAL_IMAGE_NAME"
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        shell: bash -l {0}
        run: |
          docker tag "$LOCAL_IMAGE_NAME" "$IMAGE_NAME"

      - name: Push Docker Image
        shell: bash -l {0}
        run: |
          docker push "$IMAGE_NAME"

      - name: Commit artifacts to repository
        if: always()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p ci_artifacts/mlproject
          # copy artifacts into repository folder
          if [ -d "MLProject/artifacts" ]; then
            cp -r MLProject/artifacts/* ci_artifacts/mlproject/ || true
          fi
          git add ci_artifacts/mlproject || true
          if git diff --staged --quiet; then
            echo "No artifact changes to commit"
          else
            git commit -m "CI: add MLProject artifacts $GITHUB_RUN_ID"
            git push
          fi

