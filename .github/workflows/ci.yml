name: CI Workflow

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKER_HUB_USERNAME || secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN || secrets.DOCKERHUB_TOKEN }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        lfs: true

    - name: Setup python
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"

    - name: Check Env
      run: |
        python --version
        pip --version
        pwd
        ls -la

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow==2.22.2 cloudpickle==3.1.1 numpy==2.3.3 pandas==2.3.2 psutil==7.0.0 pyarrow==19.0.1 scikit-learn==1.7.2 scipy==1.16.2 docker==6.1.3 requests==2.31.0 urllib3==1.26.18

    - name: Run mlflow project
      run: |
        mlflow run MLProject --env-manager=local -P data=auto -P output=artifacts -P group_col=global -P target_col=Daily_Revenue

    - name: Get latest MLflow run_id
      run: |
        if [ -d "mlruns/0" ]; then
          MLRUNS_DIR="mlruns/0"
        else
          MLRUNS_DIR="MLProject/mlruns/0"
        fi

        RUN_ID=$(basename "$(ls -td "$MLRUNS_DIR"/*/ | head -n 1)")
        echo "MLRUNS_DIR=$MLRUNS_DIR" >> $GITHUB_ENV
        echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Latest run_id: $RUN_ID"

    - name: Upload to GitHub LFS
      run: |
        ARTIFACT_DIR="ci_artifacts/mlproject/$RUN_ID"
        mkdir -p "$ARTIFACT_DIR"
        cp -r "$MLRUNS_DIR/$RUN_ID/artifacts/." "$ARTIFACT_DIR/"

        git lfs install --local
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add ci_artifacts/
        git commit -m "Upload artifact to GitHub LFS [skip ci]" || echo "No changes to commit"
        git push origin main

    - name: Build Docker Model
      run: |
        mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "mlproject-model" --env-manager local

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKERHUB_USER }}
        password: ${{ env.DOCKERHUB_TOKEN }}

    - name: Tag Docker Image
      run: |
        docker tag mlproject-model ${{ env.DOCKERHUB_USER }}/mlproject-model:latest
        
    - name: Push Docker Image
      run: |
        docker push ${{ env.DOCKERHUB_USER }}/mlproject-model:latest

